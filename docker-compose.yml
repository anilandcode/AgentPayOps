services:
  agentpayops:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentpayops
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      X402_MODE: ${X402_MODE:-demo}
      X402_RECEIVING_ADDRESS: ${X402_RECEIVING_ADDRESS:-}
      EVM_ADDRESS: ${EVM_ADDRESS:-}
      X402_NETWORK: ${X402_NETWORK:-eip155:84532}
      X402_VENDOR_REPORT_PRICE: ${X402_VENDOR_REPORT_PRICE:-0.42}
      X402_FACILITATOR_URL: ${X402_FACILITATOR_URL:-https://facilitator.x402.org}
